version: 1

component-types:

  - type: actuator
    description: Motor for actuating dampers or valves.
    roles:
      - valve
      - heating-valve
      - cooling-valve
      - damper
      - outdoor-air-damper
      - exhaust-air-damper
      - supply-air-damper
      - extract-air-damper
      - fire-damper
      - by-pass-damper
      - recirculation-damper
    typical-points:
      - command
      - position
      - open
      - closed
      - fault

  - type: fan
    description: Air handling fan.
    roles:
      - supply-air
      - extract-air
      - exhaust-air
      - circulation-air
      - return-air
    typical-points:
      - command
      - running
      - speed
      - fault
      - run-hours
      - start-count
      - power

  - type: heat-exchanger
    description: Heat recovery heat exchanger.
    roles:
      - rotary
      - plate
      - run-around
    typical-points:
      - command
      - fault
      - bypass-position
      - efficiency

  - type: humidity-sensor
    description: Measures relative humidity.
    roles:
      - room
      - supply-air
      - extract-air
    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault

  - type: pressure-sensor
    description: Measures air or water pressure.
    roles:
      - supply-air
      - extract-air
      - duct
      - filter
      - water

    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault

  - type: pump
    description: Pump for hydronic circuits or evacuation.
    roles:
      - heating
      - chilled-water
      - condenser
      - hot-water
      - heat-recovery
    typical-points:
      - command
      - running
      - fault
      - overload
      - speed
      - run-hours
      - start-count
      - power

  - type: temperature-sensor
    description: Measures temperature.
    roles:
      - supply-air
      - extract-air
      - outdoor-air
      - exhaust-air
      - room
      - flow
      - return
      - cylinder
    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault
