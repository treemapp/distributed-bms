version: 1

component-types:

  - type: co2-sensor

    description: Measures carbon dioxide concentration.

    roles:
      - supply-air
      - extract-air
      - room
      - return-air

    typical-points:
      - process-value
      - set-point
      - high-alarm
      - sensor-fault

  - type: cooling-coil

    description: Air cooling coil.

    roles:
      - supply-air

    typical-points:
      - valve-position
      - inlet-temperature
      - outlet-temperature
      - condensation-alarm

  - type: damper

    description: Motorised air damper.

    roles:
      - outdoor-air
      - exhaust-air
      - recirculation
      - bypass

    typical-points:
      - command
      - position
      - open
      - closed
      - fault

  - type: fan

    description: Air handling fan.

    roles:
      - supply-air
      - extract-air
      - exhaust-air
      - return-air

    typical-points:
      - command
      - running
      - speed
      - fault
      - run-hours
      - start-count
      - power

  - type: filter

    description: Air filter.

    roles:
      - supply-air
      - extract-air
      - outdoor-air

    typical-points:
      - dirty
      - pressure-drop
      - warning
      - alarm

  - type: heat-exchanger

    description: Heat recovery heat exchanger.

    roles:
      - rotary
      - plate
      - run-around

    typical-points:
      - bypass-position
      - efficiency
      - frost-alarm

  - type: heating-coil

    description: Air heating coil.

    roles:
      - supply-air

    typical-points:
      - valve-position
      - inlet-temperature
      - outlet-temperature
      - frost-alarm

  - type: humidity-sensor

    description: Measures relative humidity.

    roles:
      - room
      - supply-air
      - extract-air

    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault

  - type: pressure-sensor

    description: Measures air or water pressure.

    roles:
      - supply-air
      - extract-air
      - duct
      - filter
      - water

    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault

  - type: pump

    description: Water circulation pump.

    roles:
      - heating
      - chilled-water
      - condenser
      - hot-water
      - heat-recovery

    typical-points:
      - command
      - running
      - fault
      - overload
      - speed
      - run-hours
      - start-count
      - power

  - type: temperature-sensor

    description: Measures temperature.

    roles:
      - supply-air
      - extract-air
      - outdoor-air
      - exhaust-air
      - room
      - flow
      - return
      - cylinder

    typical-points:
      - process-value
      - set-point
      - high-alarm
      - low-alarm
      - sensor-fault

  - type: three-position-valve

    description: Three-position motorised valve.

    roles:
      - heating
      - cooling

    typical-points:
      - open-command
      - close-command
      - position
      - fault

  - type: two-position-valve

    description: Two-position motorised valve.

    roles:
      - heating
      - cooling

    typical-points:
      - command
      - position
      - fault